[Settings]
; 自动解压ZIP文件 (true/false)
AutoExtractZip=true

; 是否启用断点续传 (true/false)
EnableResume=true

; 默认下载路径（为空则使用程序所在目录）
DefaultDownloadPath=

; 背景图片列表（多个用 | 分隔，为空则使用默认背景）
; 示例：bg1.jpg|bg2.jpg|bg3.jpg
BackgroundImages=

; 默认选择的下载项目（对应Downloads节中的键名）
DefaultDownload=Keira工具

[Servers]
; 下载资源服务器地址（用于相对路径，可选）
BaseUrl=
; 备用镜像地址（可选，多个用 | 分隔）
Mirrors=

[Downloads]
; 下载链接配置格式：名称=URL
; 可以添加多个下载链接，每行一个
Keira工具=https://gitee.com/wyark/keira3/releases/download/Keira3%E6%B1%89%E5%8C%96%E7%89%88/Keira-3.10.3.WINDOWS.exe%20(1).zip

[Announcement]
; 公告标题
Title=直链下载器

; 公告内容 (支持多行，用 | 分隔)
Content=  欢迎使用WY直链下载器！|• 支持HTTP/HTTPS协议的直链下载|• 实时显示下载进度、速度和文件大小|• 支持ZIP文件自动解压功能|• 支持暂停/继续下载操作|• 文件将保存到程序所在目录|• 可通过config.ini配置下载链接和公告内容|• 支持多个下载链接快速切换

[UI]
; 界面配置
WindowWidth=900
WindowHeight=505
